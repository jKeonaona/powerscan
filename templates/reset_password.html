{% extends "base.html" %}
{% block title %}Set New Password - PowerScan{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="PowerScan" style="max-height:80px; max-width:100%; object-fit:contain;" class="mb-3">
                    <h5>New Password</h5>
                    <p class="text-muted">Choose a new password for your account.</p>
                </div>
                <form method="POST">
                    <input type="hidden" name="token" value="{{ token }}">
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required autofocus minlength="8">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('login') }}" class="text-muted small">Back to sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
