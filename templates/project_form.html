{% extends "base.html" %}
{% block title %}New Project - PowerScan{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('companies') }}">Companies</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('projects', company_id=company.id) }}">{{ company.name }}</a></li>
                    <li class="breadcrumb-item active">New Project</li>
                </ol>
            </nav>
            <h2 class="mb-4">New Project</h2>
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Project Name</label>
                            <input type="text" class="form-control" id="name" name="name" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description (optional)</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Create Project</button>
                            <a href="{{ url_for('projects', company_id=company.id) }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
