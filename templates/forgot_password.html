{% extends "base.html" %}
{% block title %}Forgot Password - PowerScan{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="PowerScan" style="max-height:80px; max-width:100%; object-fit:contain;" class="mb-3">
                    <h5>Reset Password</h5>
                    <p class="text-muted">Enter your email and we'll send you a reset link.</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('login') }}" class="text-muted small">Back to sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
