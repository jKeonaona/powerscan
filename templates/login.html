{% extends "base.html" %}
{% block title %}Login - PowerScan{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="PowerScan" style="max-height:80px; max-width:100%; object-fit:contain;" class="mb-3">
                    <p class="text-muted mb-0">Construction Document Manager</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('forgot_password') }}" class="text-muted small">Forgot your password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
